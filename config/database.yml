default: &default
  adapter: postgresql
  encoding: unicode
  host: localhost
  username: postgres
  password: postgres
  port: 5432
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: jigsaw_engine_development

test:
  <<: *default
  database: jigsaw_engine_test

production:
  primary: &primary_production
    <<: *default
    database: jigsaw_engine_production
    username: jigsaw_engine
    password: <%= ENV["JIGSAW_ENGINE_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: jigsaw_engine_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: jigsaw_engine_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: jigsaw_engine_production_cable
    migrations_paths: db/cable_migrate
