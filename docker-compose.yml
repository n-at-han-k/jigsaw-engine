volumes:
  postgres_data:

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db_test:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "6432:5432"
    tmpfs:
      - /var/lib/postgresql/data
